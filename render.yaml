services:
  # ── Node.js API ─────────────────────────────────────────────
  - type: web
    name: ipl-api
    env: node
    region: oregon
    plan: free
    rootDir: apps/api
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: DATABASE_URL
        sync: false   # Set in Render dashboard (your Neon URL)
      - key: CRICKET_API_KEY
        sync: false   # Set in Render dashboard
      - key: CRICKET_API_URL
        value: https://api.cricapi.com/v1
      - key: ML_SERVICE_URL
        fromService:
          name: ipl-ml
          type: web
          property: hostURL

  # ── Python ML Service ────────────────────────────────────────
  - type: web
    name: ipl-ml
    env: python
    region: oregon
    plan: free
    rootDir: services/ml
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        sync: false   # Set in Render dashboard (your Neon URL)
