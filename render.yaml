services:
  - type: web
    name: ipl-web
    runtime: static
    region: oregon
    rootDir: apps/web
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        value: https://api.ai-developer.in

  - type: web
    name: ipl-api
    runtime: node
    region: oregon
    plan: free
    rootDir: apps/api
    buildCommand: npm install --include=dev && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: CRICKET_API_KEY
        sync: false
      - key: CRICKET_API_URL
        value: https://api.cricapi.com/v1
      - key: IPL_SEASON
        value: "2026"
      - key: ML_SERVICE_URL
        fromService:
          type: web
          name: ipl-ml
          property: hostURL
      - key: CORS_ORIGINS
        value: https://ai-developer.in,https://www.ai-developer.in

  - type: web
    name: ipl-ml
    runtime: python
    region: oregon
    plan: free
    rootDir: services/ml
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: AUTO_TRAIN_PREMATCH
        value: "1"
      - key: AUTO_TRAIN_LIVE
        value: "0"
      - key: PYTHON_VERSION
        value: 3.11.9
